<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAME PICK - 공지사항 상세</title>
    <style>
        @font-face {
            font-family: 'LotteMartDream';
            src: url('//cdn.jsdelivr.net/korean-webfonts/1/corps/lottemart/LotteMartDream/LotteMartDreamMedium.woff2') format('woff2'),
                 url('//cdn.jsdelivr.net/korean-webfonts/1/corps/lottemart/LotteMartDream/LotteMartDreamMedium.woff') format('woff');
            font-weight: 400;
            font-display: swap;
        }
        @font-face {
            font-family: 'LotteMartDream';
            src: url('//cdn.jsdelivr.net/korean-webfonts/1/corps/lottemart/LotteMartDream/LotteMartDreamBold.woff2') format('woff2'),
                 url('//cdn.jsdelivr.net/korean-webfonts/1/corps/lottemart/LotteMartDream/LotteMartDreamBold.woff') format('woff');
            font-weight: 700;
            font-display: swap;
        }
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --accent-blue: #1f6feb;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'LotteMartDream', sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
        }
        .container {
            max-width: 900px;
            margin: 36px auto;
            padding: 0 20px 40px;
        }
        .card {
            background: var(--card-bg);
            border: 1px solid #30363d;
            border-radius: 14px;
            padding: 24px;
        }
        h1 { margin: 0 0 8px; font-size: 1.6rem; }
        .meta { color: var(--text-secondary); font-size: 0.88rem; margin-bottom: 18px; }
        .content {
            border-top: 1px solid rgba(255,255,255,0.08);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding: 16px 0;
            color: #d5dce3;
            margin-bottom: 16px;
            line-height: 1.7;
        }
        .comment-title { margin: 0 0 10px; font-size: 1rem; }
        .comment-form {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .comment-form input {
            flex: 1;
            min-width: 220px;
            border: 1px solid #30363d;
            border-radius: 8px;
            background: #0d1117;
            color: var(--text-primary);
            padding: 10px 12px;
            font-family: inherit;
            font-size: 0.9rem;
        }
        .comment-form button {
            border: none;
            border-radius: 8px;
            background: var(--accent-blue);
            color: #fff;
            padding: 0 14px;
            font-size: 0.88rem;
            font-weight: 700;
            cursor: pointer;
        }
        .back-link {
            display: inline-block;
            margin-top: 14px;
            color: #58a6ff;
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
<main class="container">
    <section class="card">
        <h1 id="noticeTitle">공지사항</h1>
        <div class="meta" id="noticeDate">날짜</div>
        <div class="content" id="noticeContent"></div>

        <h2 class="comment-title">댓글 작성</h2>
        <form class="comment-form" action="#" method="post">
            <input type="text" name="comment" placeholder="댓글을 입력하세요" required>
            <button type="submit">등록</button>
        </form>

        <a class="back-link" href="/notice">공지사항 목록으로 돌아가기</a>
    </section>
</main>

<script>
    const noticeData = {
        maintenance: {
            title: "시스템 정기 점검 안내",
            date: "2026.04.26",
            content: "안정적인 서비스 제공을 위해 정기 점검이 진행됩니다. 점검 시간 동안 일부 기능 이용이 제한될 수 있습니다."
        },
        update: {
            title: "신규 게임 정보 업데이트 소식",
            date: "2026.04.25",
            content: "신규 게임 페이지와 메타 정보가 업데이트되었습니다. 게임별 공략과 추천 덱 정보도 순차적으로 추가될 예정입니다."
        },
        rules: {
            title: "커뮤니티 이용 규칙 안내 (필독)",
            date: "2026.04.20",
            content: "욕설, 비방, 도배, 광고성 게시물은 제재 대상입니다. 건전한 커뮤니티 문화를 위해 이용 규칙을 준수해주세요."
        }
    };

    const params = new URLSearchParams(window.location.search);
    const post = params.get("post");
    const selected = noticeData[post] || noticeData.maintenance;

    document.getElementById("noticeTitle").textContent = selected.title;
    document.getElementById("noticeDate").textContent = selected.date;
    document.getElementById("noticeContent").textContent = selected.content;
</script>
</body>
</html>
