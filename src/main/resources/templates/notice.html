<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAME PICK - 공지사항</title>
    <style>
        @font-face {
            font-family: 'LotteMartDream';
            src: url('//cdn.jsdelivr.net/korean-webfonts/1/corps/lottemart/LotteMartDream/LotteMartDreamMedium.woff2') format('woff2'),
                 url('//cdn.jsdelivr.net/korean-webfonts/1/corps/lottemart/LotteMartDream/LotteMartDreamMedium.woff') format('woff');
            font-weight: 400;
            font-display: swap;
        }
        @font-face {
            font-family: 'LotteMartDream';
            src: url('//cdn.jsdelivr.net/korean-webfonts/1/corps/lottemart/LotteMartDream/LotteMartDreamBold.woff2') format('woff2'),
                 url('//cdn.jsdelivr.net/korean-webfonts/1/corps/lottemart/LotteMartDream/LotteMartDreamBold.woff') format('woff');
            font-weight: 700;
            font-display: swap;
        }
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --accent-blue: #1f6feb;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'LotteMartDream', sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
        }
        .container {
            max-width: 900px;
            margin: 36px auto;
            padding: 0 20px 40px;
        }
        .board {
            background: var(--card-bg);
            border: 1px solid #30363d;
            border-radius: 14px;
            padding: 24px;
        }
        h1 { margin: 0 0 8px; font-size: 1.75rem; }
        .desc { margin: 0 0 18px; color: var(--text-secondary); font-size: 0.92rem; }
        .notice-list { list-style: none; margin: 0; padding: 0; }
        .notice-list li {
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .notice-link {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            text-decoration: none;
            color: var(--text-primary);
            padding: 14px 4px;
        }
        .notice-link:hover { color: #58a6ff; }
        .date { color: var(--text-secondary); font-size: 0.85rem; }
        .home-link {
            display: inline-block;
            margin-top: 16px;
            color: #58a6ff;
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
<main class="container">
    <section class="board">
        <h1>공지사항</h1>
        <p class="desc">공지 제목을 누르면 상세 화면에서 댓글을 작성할 수 있습니다.</p>
        <ul class="notice-list">
            <li>
                <a class="notice-link" href="/notice/detail?post=maintenance">
                    <span>시스템 정기 점검 안내</span><span class="date">2026.04.26</span>
                </a>
            </li>
            <li>
                <a class="notice-link" href="/notice/detail?post=update">
                    <span>신규 게임 정보 업데이트 소식</span><span class="date">2026.04.25</span>
                </a>
            </li>
            <li>
                <a class="notice-link" href="/notice/detail?post=rules">
                    <span>커뮤니티 이용 규칙 안내 (필독)</span><span class="date">2026.04.20</span>
                </a>
            </li>
        </ul>
        <a class="home-link" href="/">메인으로 돌아가기</a>
    </section>
</main>
</body>
</html>
