<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAME PICK - 자유게시판</title>
    <style>
        @font-face {
            font-family: 'LotteMartDream';
            src: url('//cdn.jsdelivr.net/korean-webfonts/1/corps/lottemart/LotteMartDream/LotteMartDreamMedium.woff2') format('woff2'),
                 url('//cdn.jsdelivr.net/korean-webfonts/1/corps/lottemart/LotteMartDream/LotteMartDreamMedium.woff') format('woff');
            font-weight: 400;
            font-display: swap;
        }
        @font-face {
            font-family: 'LotteMartDream';
            src: url('//cdn.jsdelivr.net/korean-webfonts/1/corps/lottemart/LotteMartDream/LotteMartDreamBold.woff2') format('woff2'),
                 url('//cdn.jsdelivr.net/korean-webfonts/1/corps/lottemart/LotteMartDream/LotteMartDreamBold.woff') format('woff');
            font-weight: 700;
            font-display: swap;
        }
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --accent-blue: #1f6feb;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'LotteMartDream', sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
        }
        .container {
            max-width: 900px;
            margin: 36px auto;
            padding: 0 20px 40px;
        }
        .board {
            background: var(--card-bg);
            border: 1px solid #30363d;
            border-radius: 14px;
            padding: 24px;
        }
        .header-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
            margin-bottom: 16px;
        }
        h1 { margin: 0; font-size: 1.75rem; }
        .write-link {
            text-decoration: none;
            background: var(--accent-blue);
            color: #fff;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 0.88rem;
            font-weight: 700;
        }
        .post-list { list-style: none; margin: 0; padding: 0; }
        .post-list li {
            display: flex;
            justify-content: space-between;
            gap: 14px;
            padding: 12px 4px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .writer { color: var(--text-secondary); font-size: 0.86rem; }
        .home-link {
            display: inline-block;
            margin-top: 16px;
            color: #58a6ff;
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
<main class="container">
    <section class="board">
        <div class="header-row">
            <h1>자유게시판</h1>
            <a class="write-link" href="/board/write">글쓰기</a>
        </div>
        <ul class="post-list">
            <li><span>오늘 롤 연승 기분 최고네요!</span><span class="writer">작성자: 협곡왕</span></li>
            <li><span>발로란트 감도 설정 공유합니다</span><span class="writer">작성자: 헤드헌터</span></li>
            <li><span>롤토체스 이번 시즌 꿀조합 추천</span><span class="writer">작성자: 전략가</span></li>
        </ul>
        <a class="home-link" href="/">메인으로 돌아가기</a>
    </section>
</main>
</body>
</html>
