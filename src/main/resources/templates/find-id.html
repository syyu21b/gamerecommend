<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아이디 찾기 | GAME PICK</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0d1117;
            color: #f0f6fc;
            font-family: Arial, sans-serif;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            width: min(100%, 420px);
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 24px;
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 1.4rem;
        }

        p {
            margin: 0 0 18px 0;
            color: #8b949e;
            font-size: 0.95rem;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 12px;
        }

        input {
            padding: 10px 12px;
            border: 1px solid #30363d;
            border-radius: 8px;
            background: #0d1117;
            color: #f0f6fc;
        }

        button, a {
            width: 100%;
            padding: 11px 12px;
            border-radius: 8px;
            border: none;
            font-weight: 700;
            text-align: center;
            text-decoration: none;
            box-sizing: border-box;
        }

        button {
            cursor: pointer;
            background: #1f6feb;
            color: #fff;
            margin-top: 6px;
        }

        .back-link {
            display: inline-block;
            margin-top: 10px;
            border: 1px solid #30363d;
            color: #c9d1d9;
            background: #0d1117;
        }
    </style>
</head>
<body>
<main class="card">
    <h1>아이디 찾기</h1>
    <p>가입 시 등록한 이름과 이메일을 입력하면 아이디를 확인할 수 있습니다.</p>
    <form>
        <div class="field">
            <label for="name">이름</label>
            <input id="name" name="name" type="text" required placeholder="이름 입력">
        </div>
        <div class="field">
            <label for="email">이메일</label>
            <input id="email" name="email" type="email" required placeholder="example@email.com">
        </div>
        <button type="submit">아이디 찾기</button>
    </form>
    <a class="back-link" href="/">메인으로 돌아가기</a>
</main>
<script>
    document.querySelector("form").addEventListener("submit", function (event) {
        event.preventDefault();
        alert("입력한 정보로 아이디를 조회했습니다. (데모 페이지)");
    });
</script>
</body>
</html>
