<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAME PICK - 회원가입</title>
    <style>
        @font-face {
            font-family: 'LotteMartDream';
            src: url('//cdn.jsdelivr.net/korean-webfonts/1/corps/lottemart/LotteMartDream/LotteMartDreamMedium.woff2') format('woff2'),
                 url('//cdn.jsdelivr.net/korean-webfonts/1/corps/lottemart/LotteMartDream/LotteMartDreamMedium.woff') format('woff');
            font-weight: 400;
            font-display: swap;
        }

        @font-face {
            font-family: 'LotteMartDream';
            src: url('//cdn.jsdelivr.net/korean-webfonts/1/corps/lottemart/LotteMartDream/LotteMartDreamBold.woff2') format('woff2'),
                 url('//cdn.jsdelivr.net/korean-webfonts/1/corps/lottemart/LotteMartDream/LotteMartDreamBold.woff') format('woff');
            font-weight: 700;
            font-display: swap;
        }

        @font-face {
            font-family: 'LotteMartDream';
            src: url('//cdn.jsdelivr.net/korean-webfonts/1/corps/lottemart/LotteMartDream/LotteMartDreamLight.woff2') format('woff2'),
                 url('//cdn.jsdelivr.net/korean-webfonts/1/corps/lottemart/LotteMartDream/LotteMartDreamLight.woff') format('woff');
            font-weight: 300;
            font-display: swap;
        }

        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --accent-blue: #1f6feb;
            --accent-glow: rgba(31, 111, 235, 0.4);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'LotteMartDream', sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .signup-card {
            width: min(100%, 460px);
            background: var(--card-bg);
            border: 1px solid #30363d;
            border-radius: 14px;
            padding: 28px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.45);
        }

        .signup-card h1 {
            margin: 0 0 6px;
            font-size: 1.6rem;
        }

        .signup-card p {
            margin: 0 0 20px;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .signup-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .signup-form label {
            font-size: 0.9rem;
            font-weight: 600;
        }

        .signup-form input {
            width: 100%;
            padding: 11px 12px;
            border-radius: 8px;
            border: 1px solid #30363d;
            background: #0d1117;
            color: var(--text-primary);
            font-size: 0.95rem;
        }

        .signup-form input:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 2px rgba(31, 111, 235, 0.25);
        }

        .btn-signup-submit {
            margin-top: 8px;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 0.95rem;
            font-weight: 700;
            color: #fff;
            background: var(--accent-blue);
            cursor: pointer;
        }

        .btn-signup-submit:hover {
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .go-home {
            display: inline-block;
            margin-top: 14px;
            color: #58a6ff;
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
<section class="signup-card">
    <h1>회원가입</h1>
    <p>GAME PICK 계정을 만들고 커뮤니티를 이용해보세요.</p>

    <form class="signup-form" action="#" method="post">
        <label for="username">아이디</label>
        <input id="username" name="username" type="text" placeholder="아이디를 입력하세요" required>

        <label for="email">이메일</label>
        <input id="email" name="email" type="email" placeholder="example@email.com" required>

        <label for="password">비밀번호</label>
        <input id="password" name="password" type="password" placeholder="비밀번호를 입력하세요" required>

        <label for="passwordConfirm">비밀번호 확인</label>
        <input id="passwordConfirm" name="passwordConfirm" type="password" placeholder="비밀번호를 다시 입력하세요" required>

        <button type="submit" class="btn-signup-submit">회원가입 완료</button>
    </form>

    <a class="go-home" href="/">메인으로 돌아가기</a>
    <div style="margin-top: 10px; font-size: 0.85rem; color: #8b949e;">
        가입 시 <a href="/terms" style="color:#58a6ff; text-decoration:none;">이용약관</a> 및
        <a href="/privacy" style="color:#58a6ff; text-decoration:none;">개인정보처리방침</a>에 동의한 것으로 간주됩니다.
    </div>
</section>
</body>
</html>
