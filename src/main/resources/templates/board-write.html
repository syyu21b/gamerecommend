<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAME PICK - 자유게시판 작성</title>
    <style>
        @font-face {
            font-family: 'LotteMartDream';
            src: url('//cdn.jsdelivr.net/korean-webfonts/1/corps/lottemart/LotteMartDream/LotteMartDreamMedium.woff2') format('woff2'),
                 url('//cdn.jsdelivr.net/korean-webfonts/1/corps/lottemart/LotteMartDream/LotteMartDreamMedium.woff') format('woff');
            font-weight: 400;
            font-display: swap;
        }

        @font-face {
            font-family: 'LotteMartDream';
            src: url('//cdn.jsdelivr.net/korean-webfonts/1/corps/lottemart/LotteMartDream/LotteMartDreamBold.woff2') format('woff2'),
                 url('//cdn.jsdelivr.net/korean-webfonts/1/corps/lottemart/LotteMartDream/LotteMartDreamBold.woff') format('woff');
            font-weight: 700;
            font-display: swap;
        }

        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --accent-blue: #1f6feb;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'LotteMartDream', sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.5;
        }

        .container {
            max-width: 860px;
            margin: 36px auto;
            padding: 0 20px 40px;
        }

        .write-card {
            background: var(--card-bg);
            border: 1px solid #30363d;
            border-radius: 14px;
            padding: 26px;
        }

        h1 {
            margin: 0 0 6px;
            font-size: 1.65rem;
        }

        .desc {
            margin: 0 0 20px;
            color: var(--text-secondary);
            font-size: 0.92rem;
        }

        .form-group {
            margin-bottom: 14px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.9rem;
            font-weight: 700;
        }

        input, textarea {
            width: 100%;
            border: 1px solid #30363d;
            border-radius: 8px;
            background: #0d1117;
            color: var(--text-primary);
            padding: 11px 12px;
            font-family: inherit;
            font-size: 0.95rem;
        }

        textarea { min-height: 220px; resize: vertical; }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 2px rgba(31, 111, 235, 0.25);
        }

        .actions {
            margin-top: 16px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            text-decoration: none;
            border: none;
            border-radius: 8px;
            padding: 11px 16px;
            font-size: 0.92rem;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-primary { background: var(--accent-blue); color: #fff; }
        .btn-secondary { background: #21262d; color: #c9d1d9; }
    </style>
</head>
<body>
<main class="container">
    <section class="write-card">
        <h1>자유게시판 글쓰기</h1>
        <p class="desc">자유롭게 게임 관련 이야기를 남겨보세요.</p>

        <form action="#" method="post">
            <div class="form-group">
                <label for="board-writer">작성자</label>
                <input id="board-writer" name="writer" type="text" placeholder="닉네임을 입력하세요" required>
            </div>

            <div class="form-group">
                <label for="board-title">제목</label>
                <input id="board-title" name="title" type="text" placeholder="게시글 제목을 입력하세요" required>
            </div>

            <div class="form-group">
                <label for="board-content">내용</label>
                <textarea id="board-content" name="content" placeholder="내용을 입력하세요" required></textarea>
            </div>

            <div class="actions">
                <button class="btn btn-primary" type="submit">게시글 등록</button>
                <a class="btn btn-secondary" href="/board">게시판으로 돌아가기</a>
            </div>
        </form>
    </section>
</main>
</body>
</html>
